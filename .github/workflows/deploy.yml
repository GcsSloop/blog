name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew Ruby
        uses: Homebrew/actions/setup-homebrew-ruby@master
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: |
          bundle install

      - name: Build site
        run: |
          bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
          retention-days: 1

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: _site/

      - name: Install ossutil
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -O /tmp/ossutil64
          chmod +x /tmp/ossutil64
          echo "/tmp/ossutil64 version"

      - name: Deploy to Alibaba Cloud OSS
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          BUCKET: ${{ secrets.OSS_BUCKET }}
          ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          bash deploy.sh
